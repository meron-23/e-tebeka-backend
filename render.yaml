services:
  # Backend API Service
  - type: web
    name: etebeka-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_CONFIG
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://e-tebeka-frontendd.vercel.app
